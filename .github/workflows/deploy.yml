name: Build e Push para ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: minha-api

jobs:
  build-and-push:
    name: Build e Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug OIDC token claims
        run: |
          IDTOKEN=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          PAYLOAD=$(echo "$IDTOKEN" | cut -d '.' -f2 | tr '_-' '/+')
          case $((${#PAYLOAD} % 4)) in
            2) PAYLOAD="${PAYLOAD}==";;
            3) PAYLOAD="${PAYLOAD}=";;
          esac
          echo "$PAYLOAD" | base64 -d | jq '{sub, aud, repository, repository_owner, ref, workflow_ref}'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: arn:aws:iam::589525380142:role/GitHubActionsECRRole
          aws-region: ${{ env.AWS_REGION }}
          role-skip-session-tagging: true

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e Push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "Imagem publicada: $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"